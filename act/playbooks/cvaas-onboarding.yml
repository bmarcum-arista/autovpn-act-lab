---
# This playbook will connect to CVaaS and generate an onboarding token than push the token to target devices and start terminattr 
# The target devices will be onboarded in CVaaS
- hosts: localhost
  gather_facts: false
  vars:
    cvaas_url:  www.cv-staging.corp.arista.io
    # service account token for CVaaS
    cvaas_service_token: "{{lookup('file', './../../cvaas-service.tok')}}"

  tasks:
# Generate token for CVaaS cluster
  - name: "Generating TerminAttr onboarding token on CVaaS"
    tags: [build]
    ansible.builtin.uri:
      url: "https://{{cvaas_url}}/api/v3/services/admin.Enrollment/AddEnrollmentToken"
      method: POST
      headers:
        Accept: "application/json"
        Cookie: "access_token={{ cvaas_service_token }}"
      validate_certs: no
      return_content: yes
      body: '{"enrollmentToken": {"reenrollDevices": ["*"], "validFor": "720h"}}'
    register: cv_onboarding_token
    until: cv_onboarding_token.status == 200
    retries: 10
    delay: 2
  # Writing cvaas token to file
  - name: "Parsing CVaaS token"
    tags: [build]
    set_fact:
      cv_onboarding_token: "{{ cv_onboarding_token.content | list | join }}"
  - name: "Writing CVaaS token to file"
    tags: [build]
    copy:
      content: "{{ cv_onboarding_token[0].enrollmentToken.token }}"
      dest: "./../../cvaas-token.tok"


- name: Onboard devices to CVaaS
  hosts: VEOS:CLOUDEOS                                  # Change to your value from inventory file
  gather_facts: false
  vars:
    ansible_user: cvpadmin                   # Change to a valid username on EOS devices
    ansible_password: cvp123!          # Change to a valid password on EOS devices
    ansible_connection: httpapi
    ansible_httpapi_use_ssl: True
    ansible_httpapi_validate_certs: False
    ansible_network_os: eos
    ansible_httpapi_port: 443
    ansible_python_interpreter: $(which python3) 
    # terminattr_vrf: MGMT                     # Change this if TerminiAttr needs to use another VRF
  tasks:
  - name: "Copy onboarding token and start the TerminAttr daemon"
    tags: [onboard]
    ansible.builtin.uri:
      url: "https://{{ansible_user}}:{{ansible_password}}@{{hostvars[inventory_hostname].ansible_host}}/command-api"
      method: POST
      headers:
        Accept: "application/json"
      validate_certs: no
      return_content: yes
      force_basic_auth: true
      body:
        jsonrpc: "2.0"
        method: "runCmds"
        params:
          version: 1
          cmds:
          - "enable"
          - cmd: "copy terminal: file:/tmp/onboarding-token"
            input: "{{lookup('file', './../../cvaas-token.tok')}}"
          - "configure"
          - "ntp server 0.us.pool.ntp.org iburst"
          - "daemon TerminAttr"
          - "shutdown"
          - "exec /usr/bin/TerminAttr -cvaddr=apiserver.cv-staging.corp.arista.io:443 -cvauth=token-secure,/tmp/onboarding-token -disableaaa -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -ingestexclude=/Sysdb/cell/1/agent,/Sysdb/cell/2/agent -taillogs"
          - "no shutdown"
          - "username cvpadmin privilege 15"
          - "aaa authorization exec default local"
          format: json
          timestamps: false
          autoComplete: false
          expandAliases: false
          stopOnError: false
          streaming: false
          includeErrorDetail: false
        id: EapiExplorer-1
      body_format: json
    register: cv_onboarding_token
    until: cv_onboarding_token.status == 200
    retries: 10
    delay: 2
