switchport default mode routed
!
hostname CORE
!
aaa authorization exec default local
!
interface Ethernet1
   no switchport
   ip address 21.101.201.201/24
!
interface Ethernet2
   no switchport
   ip address 22.101.201.201/24
!
interface Loopback0
   ip address 10.0.0.201/32
!
ip routing
!
router bgp 65000
   router-id 10.0.0.201
   no bgp default ipv4-unicast
   distance bgp 20 200 200
   neighbor default send-community
   neighbor 21.101.201.101 remote-as 65001
   neighbor 21.101.201.101 description WEST-AGG
   neighbor 22.101.201.101 remote-as 65002
   neighbor 22.101.201.101 description EAST-AGG
   redistribute connected
   !
   address-family ipv4
      neighbor 21.101.201.101 activate
      neighbor 22.101.201.101 activate
!
