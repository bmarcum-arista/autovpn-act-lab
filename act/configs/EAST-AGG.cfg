switchport default mode routed
!
hostname EAST-AGG
!
aaa authorization exec default local
!
interface Ethernet1
   no switchport
   ip address 22.101.201.101/24
!
interface Ethernet2
   no switchport
   ip address 22.101.102.101/24
!
interface Ethernet3
   no switchport
   ip address 22.101.103.101/24
!
interface Ethernet4
   no switchport
   ip address 22.101.104.101/24
!
interface Loopback0
   ip address 10.0.2.101/32
!
ip routing
!
ntp server 0.us.pool.ntp.org iburst
!
router bgp 65002
   router-id 10.0.2.101
   no bgp default ipv4-unicast
   distance bgp 20 200 200
   neighbor default send-community
   neighbor 22.101.102.102 remote-as 65002
   neighbor 22.101.102.102 next-hop-self
   neighbor 22.101.102.102 description EAST-DC
   neighbor 22.101.103.103 remote-as 64512
   neighbor 22.101.103.103 description EAST-R1
   neighbor 22.101.201.201 remote-as 65000
   neighbor 22.101.201.201 description CORE
   !
   address-family ipv4
      neighbor 22.101.102.102 activate
      neighbor 22.101.103.103 activate
      neighbor 22.101.104.104 activate
      neighbor 22.101.201.201 activate
      network 10.0.2.101/32
!
