switchport default mode routed
!
hostname EAST-DC
!
aaa authorization exec default local
!
interface Ethernet1
   no switchport
   ip address 22.101.102.102/24
!
interface Ethernet2
   description HostB1
   switchport access vlan 30
   switchport
   spanning-tree portfast edge
!
interface Ethernet3
   description HostB2
   switchport access vlan 40
   switchport
   spanning-tree portfast edge
!
interface Loopback0
   ip address 10.0.2.102/32
!
interface Vlan30
   ip address 10.30.30.1/24
!
interface Vlan40
   ip address 10.40.40.1/24
!
ip routing
!
router bgp 65002
   router-id 10.0.2.102
   no bgp default ipv4-unicast
   distance bgp 20 200 200
   neighbor default send-community
   neighbor 22.101.102.101 remote-as 65002
   neighbor 22.101.102.101 next-hop-self
   neighbor 22.101.102.101 description EAST-AGG
   redistribute connected
   !
   address-family ipv4
      neighbor 22.101.102.101 activate
!