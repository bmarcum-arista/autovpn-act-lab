switchport default mode routed
!
hostname WEST-DC
!
aaa authorization exec default local
!
interface Ethernet1
   no switchport
   ip address 21.101.102.102/24
!
interface Ethernet2
   description HostA1
   switchport access vlan 10
   switchport
   spanning-tree portfast edge
!
interface Ethernet3
   description HostA2
   switchport access vlan 20
   switchport
   spanning-tree portfast edge
!
interface Loopback0
   ip address 10.0.1.102/32
!
interface Vlan10
   ip address 10.10.10.1/24
!
interface Vlan20
   ip address 10.20.20.1/24
!
ip routing
!
ntp server 0.us.pool.ntp.org iburst
!
router bgp 65001
   router-id 10.0.1.102
   no bgp default ipv4-unicast
   distance bgp 20 200 200
   neighbor default send-community
   neighbor 21.101.102.101 remote-as 65001
   neighbor 21.101.102.101 next-hop-self
   neighbor 21.101.102.101 description WEST-AGG
   redistribute connected
   !
   address-family ipv4
      neighbor 21.101.102.101 activate
!
