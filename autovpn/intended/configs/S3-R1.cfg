!
no enable password
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$dBV2TikvEhsviGQF$tXu/McA.AkuHvZk1/lCsegkR47ZCTJmAh/CgzdRvNn.Od9B3w69XdEW5cGWRUAmfr428P2HpfkEbNdkDucgaN/
username avd privilege 15 role network-admin secret sha512 $6$Th/KFTmIYnvxkb7Q$E3tHQxMVocrqis9cwTt.J3UpOx7DhgAuVtrIPXWIsHFhHP9QSZng13cNmcYwkTtUOVZuiyTqWt01W.t5fE9eR1
username cvpadmin privilege 15 role network-admin secret sha512 $6$dqXuoxAoGbFcWtzL$i7mEyybzlhsyY6jGKmV4NVGrOegDziitQLo4DYQLVG5EWpyVgxX.PeZLABz2XS/GJZE6kp7lURyA4Yi7/Bsjy0
!
agent KernelFib environment KERNELFIB_PROGRAM_ALL_ECMP='true'
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=apiserver.cv-staging.corp.arista.io:443 -cvauth=token-secure,/tmp/cv-onboarding-token -cvvrf=default -disableaaa -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -ingestexclude=/Sysdb/cell/1/agent,/Sysdb/cell/2/agent -taillogs
   no shutdown
!
switchport default mode routed
!
flow tracking hardware
   tracker FLOW-TRACKER
      record export on inactive timeout 70000
      record export on interval 300000
      exporter CV-TELEMETRY
         collector 127.0.0.1
         local interface Loopback0
         template interval 3600000
   no shutdown
!
service routing protocols model multi-agent
!
kernel software forwarding ecmp
!
hostname S3-R1
ip name-server vrf default 8.8.4.4
ip name-server vrf default 8.8.8.8
!
router adaptive-virtual-topology
   topology role edge
   region region1 id 1
   zone region1-ZONE id 1
   site site03 id 140
   !
   policy DEFAULT-AVT-POLICY-WITH-CP
      !
      match application-profile APP-PROFILE-CONTROL-PLANE
         avt profile DEFAULT-AVT-POLICY-CONTROL-PLANE
      !
      match application-profile default
         avt profile DEFAULT-AVT-POLICY-DEFAULT
   !
   policy PROD-AVT-POLICY
      !
      match application-profile default
         avt profile PROD-AVT-POLICY-DEFAULT
   !
   profile DEFAULT-AVT-POLICY-CONTROL-PLANE
      path-selection load-balance LB-DEFAULT-AVT-POLICY-CONTROL-PLANE
   !
   profile DEFAULT-AVT-POLICY-DEFAULT
      path-selection load-balance LB-DEFAULT-AVT-POLICY-DEFAULT
   !
   profile PROD-AVT-POLICY-DEFAULT
      path-selection load-balance LB-PROD-AVT-POLICY-DEFAULT
   !
   vrf A
      avt policy PROD-AVT-POLICY
      avt profile PROD-AVT-POLICY-DEFAULT id 1
   !
   vrf default
      avt policy DEFAULT-AVT-POLICY-WITH-CP
      avt profile DEFAULT-AVT-POLICY-CONTROL-PLANE id 254
      avt profile DEFAULT-AVT-POLICY-DEFAULT id 1
!
router path-selection
   tcp mss ceiling ipv4 ingress
   !
   path-group internet id 101
      ipsec profile CP-PROFILE
      !
      local interface Ethernet2
         stun server-profile internet-EAST-R1-Ethernet2 internet-WEST-R1-Ethernet2
      !
      peer dynamic
      !
      peer static router-ip 10.1.1.103
         name WEST-R1
         ipv4 address 192.1.103.2
      !
      peer static router-ip 10.1.2.103
         name EAST-R1
         ipv4 address 192.2.103.2
   !
   load-balance policy LB-DEFAULT-AVT-POLICY-CONTROL-PLANE
      path-group internet
   !
   load-balance policy LB-DEFAULT-AVT-POLICY-DEFAULT
      path-group internet
   !
   load-balance policy LB-PROD-AVT-POLICY-DEFAULT
      path-group internet
!
spanning-tree mode none
!
vrf instance A
!
aaa authorization exec default local
!
ip security
   ike policy CP-IKE-POLICY
      local-id 10.1.5.101
   !
   sa policy CP-SA-POLICY
      esp encryption aes256gcm128
      pfs dh-group 14
   !
   sa policy DP-SA-POLICY
      esp encryption aes256gcm128
      pfs dh-group 14
   !
   profile CP-PROFILE
      ike-policy CP-IKE-POLICY
      sa-policy CP-SA-POLICY
      connection start
      shared-key 7 0110100A480E0A0E231D1E
      dpd 10 50 clear
      mode transport
   !
   profile DP-PROFILE
      sa-policy DP-SA-POLICY
      connection start
      shared-key 7 0110100A480E0A0E231D1E
      dpd 10 50 clear
      mode transport
   !
   key controller
      profile DP-PROFILE
!
interface Dps1
   description DPS Interface
   mtu 9194
   flow tracker hardware FLOW-TRACKER
   ip address 10.1.5.101/32
!
interface Ethernet1
   flow tracker hardware FLOW-TRACKER
!
interface Ethernet2
   description internet_inet-cloud
   no shutdown
   no switchport
   flow tracker hardware FLOW-TRACKER
   ip address 192.5.101.2/30
   ip access-group ACL-SPOKE-INTERNET-IN_Ethernet2 in
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.0.5.101/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.61/24
!
interface Vxlan1
   description S3-R1_VTEP
   vxlan source-interface Dps1
   vxlan udp-port 4789
   vxlan vrf A vni 102
   vxlan vrf default vni 101
!
application traffic recognition
   !
   application ipv4 APP-CONTROL-PLANE
      destination prefix field-set PFX-PATHFINDERS
   !
   application-profile APP-PROFILE-CONTROL-PLANE
      application APP-CONTROL-PLANE
   !
   field-set ipv4 prefix PFX-PATHFINDERS
      10.1.1.103/32 10.1.2.103/32
!
ip access-list ACL-SPOKE-INTERNET-IN_Ethernet2
   1 remark Not for PRODUCTION: This ACL is built this way for the lab
   10 permit udp any host 192.5.101.2 eq isakmp non500-isakmp
   30 permit icmp any host 192.5.101.2
   deny ip any any
!
ip routing
ip routing vrf A
!
ip extcommunity-list ECL-EVPN-SOO permit soo 10.0.5.101:140
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.0.0.0/24 eq 32
!
ip route 192.0.0.0/13 192.5.101.1
!
ntp server 0.us.pool.ntp.org prefer
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   set extcommunity soo 10.0.5.101:140 additive
!
route-map RM-EVPN-EXPORT-VRF-DEFAULT permit 10
   match extcommunity ECL-EVPN-SOO
!
route-map RM-EVPN-SOO-IN deny 10
   match extcommunity ECL-EVPN-SOO
!
route-map RM-EVPN-SOO-IN permit 20
!
route-map RM-EVPN-SOO-OUT permit 10
   set extcommunity soo 10.0.5.101:140 additive
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 64512
   router-id 10.0.5.101
   no bgp default ipv4-unicast
   maximum-paths 16
   neighbor WAN-OVERLAY-PEERS peer group
   neighbor WAN-OVERLAY-PEERS remote-as 64512
   neighbor WAN-OVERLAY-PEERS update-source Dps1
   neighbor WAN-OVERLAY-PEERS bfd
   neighbor WAN-OVERLAY-PEERS bfd interval 1000 min-rx 1000 multiplier 10
   neighbor WAN-OVERLAY-PEERS ttl maximum-hops 1
   neighbor WAN-OVERLAY-PEERS password 7 n84OloP0zi9y59YbK3UctA==
   neighbor WAN-OVERLAY-PEERS send-community
   neighbor WAN-OVERLAY-PEERS maximum-routes 0
   neighbor 10.1.1.103 peer group WAN-OVERLAY-PEERS
   neighbor 10.1.1.103 description WEST-R1_Dps1
   neighbor 10.1.2.103 peer group WAN-OVERLAY-PEERS
   neighbor 10.1.2.103 description EAST-R1_Dps1
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor WAN-OVERLAY-PEERS activate
      neighbor WAN-OVERLAY-PEERS route-map RM-EVPN-SOO-IN in
      neighbor WAN-OVERLAY-PEERS route-map RM-EVPN-SOO-OUT out
      neighbor WAN-OVERLAY-PEERS encapsulation path-selection
   !
   address-family ipv4
      no neighbor WAN-OVERLAY-PEERS activate
   !
   address-family ipv4 sr-te
      neighbor WAN-OVERLAY-PEERS activate
   !
   address-family link-state
      neighbor WAN-OVERLAY-PEERS activate
      path-selection
   !
   address-family path-selection
      bgp additional-paths receive
      bgp additional-paths send any
      neighbor WAN-OVERLAY-PEERS activate
   !
   vrf A
      rd 10.0.5.101:102
      route-target import evpn 64512:102
      route-target export evpn 64512:102
      router-id 10.0.5.101
      redistribute connected
   !
   vrf default
      rd 10.0.5.101:101
      route-target import evpn 64512:101
      route-target export evpn 64512:101
      route-target export evpn route-map RM-EVPN-EXPORT-VRF-DEFAULT
!
router traffic-engineering
!
stun
   client
      server-profile internet-EAST-R1-Ethernet2
         ip address 192.2.103.2
      server-profile internet-WEST-R1-Ethernet2
         ip address 192.1.103.2
!
management ssh
   client-alive interval 240
!
router adaptive-virtual-topology
  wan fabric
    peer role edge
      rule NoP2P region self zone self site exclude all
!
end
