---

# WAN HUB Settings

fabric_name: WAN
use_anta: true
deploy_to_cv_accept_preview: true
deploy_to_cv_inventory_host: cloudvision
bgp_update_wait_install: false

wan_mode: cv-pathfinder

bgp_as: 64512

cv_pathfinder_regions:
  - name: region1
    id: 1
    sites:
      - name: site01
        id: 100
        location: Charlottesville, VA, USA
      - name: site02
        id: 120
        location: Richmond, VA, USA
      - name: site03
        id: 140
        location: Virginia Beach, VA, USA
      - name: site04
        id: 160
        location: Roanoke, VA, USA

bgp_peer_groups:
  wan_overlay_peers:
    password: "n84OloP0zi9y59YbK3UctA=="
    listen_range_prefixes:
      - 10.0.0.0/8
  wan_rr_overlay_peers:
    password: "7lREhM0K4dAcE1AXJcVlGA=="

wan_route_servers:
  - hostname: WEST-R1
  - hostname: EAST-R1

wan_ipsec_profiles:
  control_plane:
    shared_key: 0110100A480E0A0E231D1E
  data_plane:
    shared_key: 0110100A480E0A0E231D1E

wan_path_groups:
  - name: internet
    id: 101

wan_carriers:
  - name: internet
    path_group: internet

wan_virtual_topologies:
  vrfs:
    - name: default
      policy: DEFAULT-AVT-POLICY
      wan_vni: 101
    - name: A
      policy: PROD-AVT-POLICY
      wan_vni: 102
  policies:
    - name: DEFAULT-AVT-POLICY
      default_virtual_topology:
        path_groups:
          - names: [internet]
            preference: preferred
    - name: PROD-AVT-POLICY
      default_virtual_topology:
        path_groups:
          - names: [internet]
            preference: preferred
